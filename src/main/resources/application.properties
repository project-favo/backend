spring.application.name=backend

# Local secrets: classpath + proje kokundeki dosya (IDE gitignore yuzunden classpath'e kopyalamayabiliyor)
spring.config.import=optional:classpath:application-local.properties,optional:file:./src/main/resources/application-local.properties,optional:file:./application-local.properties

# Database configuration - can be overridden with environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://nozomi.proxy.rlwy.net:31290/railway?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bMVODKMpHNsgcXlQKxdZMWKMEJwcXDgL}

# JPA settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

server.port=${SERVER_PORT:8080}

# OpenAI (GPT 4.1 mini chatbot). Set OPENAI_API_KEY environment variable; do not commit the key here.
openai.api.key=${OPENAI_API_KEY:}

# Firebase Admin: Base64-encoded service account JSON only (not raw JSON). Railway: FIREBASE_SERVICE_ACCOUNT_BASE64.
firebase.service-account.base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}

# HuggingFace toxicity model (Railway: HUGGINGFACE_API_TOKEN). Boş bırakılırsa toxicity çağrısı atlanır.
huggingface.api.url=https://api-inference.huggingface.co/models/unitary/toxic-bert
huggingface.api.token=${HUGGINGFACE_API_TOKEN:}

# E-posta doğrulama (Gmail: App Password). Railway: MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:}
app.email.verification.log-code-if-mail-disabled=${APP_EMAIL_LOG_CODE_IF_MAIL_DISABLED:false}
app.email.verification.resend-cooldown-seconds=${APP_EMAIL_RESEND_COOLDOWN:60}
app.email.verification.code-ttl-minutes=${APP_EMAIL_CODE_TTL_MINUTES:15}
